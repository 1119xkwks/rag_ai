# How to re-create (kubectl):
#   kubectl delete -f 02_K8S/manifests/qdrant-pvc.yaml --ignore-not-found
#   kubectl apply  -f 02_K8S/manifests/qdrant-pvc.yaml
#   kubectl get pvc qdrant-pvc
#
# 참고:
#   - PV를 직접 생성하는 경우 PV는 별도 파일(예: qdrant-pv.yaml)로 분리한다.
#   - storageClassName을 지정하지 않으면 default StorageClass로 동적 프로비저닝된다.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  labels:
    app: qdrant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName 생략 시 클러스터의 default StorageClass 사용
  # 사용 가능한 목록: kubectl get storageclass
  # 기본 지정: kubectl patch storageclass <이름> -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
